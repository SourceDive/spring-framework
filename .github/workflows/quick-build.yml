name: 快速构建检查
on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**.java'
      - '**.gradle'
      - 'gradle/**'
      - '.github/workflows/quick-build.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-build:
    name: '快速编译 | Java 17'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 快速编译（跳过测试）
        id: build
        uses: ./.github/actions/build-optimized
        with:
          java-version: 17
          java-toolchain: true
          develocity-access-key: ${{ secrets.GRADLE_ENTERPRISE_SECRET_ACCESS_KEY }}
          skip-tests: true
          
      - name: 基础测试（仅核心模块）
        id: test
        shell: bash
        continue-on-error: true
        run: |
          # 只运行核心模块的测试
          ./gradlew :spring-core:test :spring-beans:test \
            --parallel \
            --build-cache \
            --max-workers=4 \
            --continue || echo "TEST_FAILED=true" >> $GITHUB_ENV
            
      - name: 收集测试结果
        if: always() && steps.test.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-quick-build
          path: |
            **/build/test-results/test/
            **/build/reports/tests/test/
          retention-days: 7
          if-no-files-found: ignore
          
      - name: 构建状态报告
        if: always()
        run: |
          echo "### 🚀 快速构建报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 编译状态
          if [ "${{ steps.build.outcome }}" == "success" ]; then
            echo "✅ **编译: 成功**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **编译: 失败**" >> $GITHUB_STEP_SUMMARY
          fi
          
          # 测试状态
          if [ "${{ env.TEST_FAILED }}" == "true" ]; then
            echo "⚠️ **测试: 部分失败**" >> $GITHUB_STEP_SUMMARY
            echo "  - 某些测试未通过，请查看测试报告了解详情" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.test.outcome }}" == "success" ]; then
            echo "✅ **测试: 全部通过**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.test.outcome }}" == "skipped" ]; then
            echo "⏭️ **测试: 已跳过**" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 总结" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.build.outcome }}" == "success" ]; then
            echo "🟢 代码可以成功编译，这是一个好的开始！" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "💡 **提示**: 这是一个快速检查，完整的测试套件将在合并前运行。" >> $GITHUB_STEP_SUMMARY
          
      - name: 设置工作流状态
        if: always()
        run: |
          # 只有在编译失败时才让工作流失败
          if [ "${{ steps.build.outcome }}" != "success" ]; then
            echo "编译失败，标记工作流为失败"
            exit 1
          else
            echo "编译成功，即使有测试失败也标记工作流为成功"
            exit 0
          fi